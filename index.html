<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavrChef</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="config.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="index.html" class="logo-link">SavrChef</a></h1>
            <nav class="header-nav">
                <a href="submit-recipe.html" class="submit-recipe-link">Submit Recipe</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="search-card">
                <h2>What's in your pantry?</h2>
                <p>Save more, Savor more. Let's Get Cooking!</p>
                
                <div class="ingredients-input">
                    <div class="input-container">
                        <input type="text" id="ingredientInput" placeholder="Start typing ingredients...">
                        <div class="suggestions" id="suggestions"></div>
                    </div>
                    <div class="ingredients-tags" id="ingredientsTags"></div>
                </div>

                <div class="meal-type">
                    <label for="mealSelect">Meal Type:</label>
                    <select id="mealSelect">
                        <option value="">All meals</option>
                        <option value="breakfast">Breakfast</option>
                        <option value="lunch">Lunch</option>
                        <option value="dinner">Dinner</option>
                        <option value="snack">Snack</option>
                        <option value="dessert">Dessert</option>
                    </select>
                </div>

                <button id="searchBtn">Find Recipes</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
